<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Rosco Épico - Grandes Pensadores de la Modernidad</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #0a0a1a, #1a0a2e, #16213e, #3d1f3f);
      background-size: 400% 400%;
      animation: gradient 20s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .medusa {
      position: fixed;
      width: 40px;
      height: 50px;
      pointer-events: none;
      z-index: 1;
      animation: medusaFloat 8s ease-in-out infinite;
    }

    .medusa-body {
      width: 100%;
      height: 30px;
      background: radial-gradient(ellipse at center, #b366ff, #8833ff);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 20px rgba(179, 102, 255, 0.6);
    }

    .medusa-tentacle {
      position: absolute;
      width: 2px;
      height: 20px;
      background: linear-gradient(180deg, #9944ff, transparent);
      left: 50%;
      top: 30px;
      transform: translateX(-50%);
      animation: tentacleWave 2s ease-in-out infinite;
    }

    @keyframes medusaFloat {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
    }

    @keyframes tentacleWave {
      0%, 100% { transform: translateX(-50%) scaleY(1); }
      50% { transform: translateX(-50%) scaleY(0.8); }
    }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 26, 0.95);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(179, 102, 255, 0.3);
      max-width: 1100px;
      width: 100%;
      backdrop-filter: blur(20px);
      border: 2px solid rgba(179, 102, 255, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: #b366ff;
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(179, 102, 255, 0.8);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(179, 102, 255, 0.8); }
      50% { text-shadow: 0 0 50px rgba(179, 102, 255, 1); }
    }

    .header p {
      color: #a0a0c0;
      font-size: 1.1em;
      text-shadow: 0 0 10px rgba(179, 102, 255, 0.3);
    }

    .game-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(179, 102, 255, 0.15), rgba(100, 50, 150, 0.1));
      border-radius: 15px;
      border: 2px solid rgba(179, 102, 255, 0.3);
      gap: 15px;
      flex-wrap: wrap;
    }

    .info-item {
      text-align: center;
      color: #b366ff;
      flex: 1;
      min-width: 120px;
    }

    .info-label {
      font-size: 0.9em;
      color: #a0a0c0;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 1.8em;
      font-weight: 700;
      color: #b366ff;
      text-shadow: 0 0 10px rgba(179, 102, 255, 0.5);
    }

    .rosco-container {
      position: relative;
      width: 600px;
      height: 600px;
      margin: 0 auto 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rosco-circle {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .rosco-letter {
      position: absolute;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a4a6a, #3a3a5a);
      border: 3px solid #888aaa;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 2em;
      font-weight: 900;
      color: #888aaa;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .rosco-letter:hover:not(.used):not(.incorrect) {
      background: linear-gradient(135deg, #6a6a8a, #5a5a7a);
      color: #b366ff;
      border-color: #b366ff;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 30px rgba(179, 102, 255, 0.6);
    }

    .rosco-letter.used {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-color: #4ade80;
      color: white;
      cursor: not-allowed;
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
      animation: popPulse 0.5s ease;
    }

    @keyframes popPulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .rosco-letter.incorrect {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #ef4444;
      color: white;
      cursor: not-allowed;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translate(-50%, -50%) translateX(0); }
      25% { transform: translate(-50%, -50%) translateX(-10px); }
      75% { transform: translate(-50%, -50%) translateX(10px); }
    }

    .rosco-letter.skip {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #f59e0b;
      color: white;
      cursor: not-allowed;
    }

    .particle {
      position: absolute;
      pointer-events: none;
    }

    .particle-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 10px #4ade80;
      animation: particleFloat 1s ease-out forwards;
    }

    @keyframes particleFloat {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0);
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: linear-gradient(135deg, #0a0a1a, #1a0a2e);
      border-radius: 25px;
      padding: 40px;
      max-width: 650px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(179, 102, 255, 0.4);
      border: 3px solid #b366ff;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px) scale(0.9);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .modal-header {
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .modal-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #b366ff, #8833ff);
      border-radius: 50%;
      font-size: 3.5em;
      font-weight: 900;
      color: white;
      box-shadow: 0 0 30px rgba(179, 102, 255, 0.7);
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      color: #b366ff;
      font-size: 1.5em;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(179, 102, 255, 0.5);
    }

    .question-text {
      color: #e0e0f0;
      font-size: 1.2em;
      margin: 25px 0;
      line-height: 1.7;
      padding: 20px;
      background: rgba(179, 102, 255, 0.08);
      border-left: 5px solid #b366ff;
      border-radius: 10px;
    }

    .answer-hint {
      color: #a0a0c0;
      font-size: 0.95em;
      margin: 15px 0;
      padding: 12px 15px;
      background: rgba(179, 102, 255, 0.1);
      border-radius: 8px;
      border-left: 3px solid #b366ff;
    }

    .answer-hint strong {
      color: #b366ff;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin: 25px 0;
    }

    .answer-input {
      flex: 1;
      padding: 15px;
      background: rgba(10, 10, 30, 0.5);
      border: 2px solid #b366ff;
      border-radius: 10px;
      color: #b366ff;
      font-size: 1.1em;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    .answer-input:focus {
      outline: none;
      background: rgba(179, 102, 255, 0.15);
      box-shadow: 0 0 25px rgba(179, 102, 255, 0.5);
      border-color: #b366ff;
    }

    .answer-input::placeholder {
      color: #666;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    .btn {
      flex: 1;
      padding: 15px 25px;
      font-size: 1.1em;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-submit {
      background: linear-gradient(135deg, #b366ff, #8833ff);
      color: white;
      box-shadow: 0 0 20px rgba(179, 102, 255, 0.4);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(179, 102, 255, 0.6);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-skip {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }

    .btn-skip:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(245, 158, 11, 0.5);
    }

    .result-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: 700;
      text-align: center;
      display: none;
      border: 2px solid;
    }

    .result-message.success {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border-color: #4ade80;
      display: block;
      animation: slideDown 0.3s ease;
    }

    .result-message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border-color: #ef4444;
      display: block;
      max-height: 150px;
      overflow-y: auto;
      animation: shake 0.3s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .study-modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      transition: all 0.4s ease;
      width: 90%;
      max-width: 700px;
    }

    .study-modal.active {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .study-content {
      background: linear-gradient(135deg, #1a0a2e, #2a1a4e);
      border-radius: 20px;
      padding: 35px;
      border: 3px solid #4ade80;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(74, 222, 128, 0.3);
      max-height: 80vh;
      overflow-y: auto;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .study-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 2px solid #4ade80;
      padding-bottom: 15px;
    }

    .study-title {
      color: #4ade80;
      font-size: 1.6em;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }

    .close-btn {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.8em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
    }

    .close-btn:hover {
      transform: rotate(90deg) scale(1.1);
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.6);
    }

    .study-body {
      color: #d0d0e0;
      font-size: 1.05em;
      line-height: 1.8;
    }

    .study-body h3 {
      color: #4ade80;
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 1.3em;
    }

    .study-body p {
      margin-bottom: 15px;
      text-align: justify;
    }

    .stats {
      margin-top: 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(179, 102, 255, 0.15), rgba(100, 50, 150, 0.1));
      border-radius: 15px;
      border: 2px solid rgba(179, 102, 255, 0.3);
    }

    .stats h3 {
      color: #b366ff;
      margin-bottom: 15px;
    }

    .progress-bar {
      width: 100%;
      height: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
      border: 2px solid rgba(179, 102, 255, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #b366ff, #4ade80);
      transition: width 0.4s ease;
      box-shadow: 0 0 10px rgba(179, 102, 255, 0.5);
    }

    .completion-message {
      text-align: center;
      margin-top: 20px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(179, 102, 255, 0.2));
      border: 2px solid #4ade80;
      border-radius: 15px;
      color: #4ade80;
      font-size: 1.3em;
      font-weight: 700;
      display: none;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }

    .completion-message.show {
      display: block;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @media (max-width: 1024px) {
      .rosco-container {
        width: 500px;
        height: 500px;
      }

      .rosco-letter {
        width: 60px;
        height: 60px;
        font-size: 1.6em;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .rosco-container {
        width: 380px;
        height: 380px;
        margin: 0 auto 20px;
      }

      .rosco-letter {
        width: 50px;
        height: 50px;
        font-size: 1.3em;
      }

      .modal-content {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>

  <div class="container">
    <div class="header">
      <h1>🎯 Rosco Épico</h1>
      <p>Grandes Pensadores de la Modernidad (A-Z)</p>
    </div>

    <div class="game-info">
      <div class="info-item">
        <div class="info-label">✓ Acertadas</div>
        <div class="info-value" id="correctCount">0/26</div>
      </div>
      <div class="info-item">
        <div class="info-label">⊘ Saltadas</div>
        <div class="info-value" id="skippedCount">0</div>
      </div>
      <div class="info-item">
        <div class="info-label">✗ Intentos</div>
        <div class="info-value" id="attemptsCount">0</div>
      </div>
    </div>

    <div class="rosco-container">
      <div class="rosco-circle" id="roscoCircle"></div>
    </div>

    <div class="stats">
      <h3>📊 Progreso General</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="completion-message" id="completionMessage">
        🎉 ¡FELICITACIONES! ¡COMPLETASTE EL ROSCO! 🎉
      </div>
    </div>
  </div>

  <div id="questionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-letter" id="modalLetter">A</div>
        <div class="modal-title" id="modalTitle">Pregunta A</div>
      </div>

      <div class="question-text" id="questionText">Pregunta de ejemplo</div>
      <div class="answer-hint" id="answerHint">Pista</div>

      <div class="input-group">
        <input
          type="text"
          class="answer-input"
          id="answerInput"
          placeholder="Escribe tu respuesta..."
          autocomplete="off"
        >
      </div>

      <div class="result-message" id="resultMessage"></div>

      <div class="button-group">
        <button class="btn btn-submit" id="submitBtn">Responder</button>
        <button class="btn btn-skip" id="skipBtn">Saltar</button>
      </div>
    </div>
  </div>

  <div id="studyModal" class="study-modal">
    <div class="study-content">
      <div class="study-header">
        <div class="study-title" id="studyTitle">Modo Estudio</div>
        <button class="close-btn" id="closeStudyBtn">&times;</button>
      </div>
      <div class="study-body" id="studyBody">Contenido detallado</div>
    </div>
  </div>

  <script>
    const gameData = [
      {
        letter: 'A',
        question: '¿Cuál es el nombre del filósofo francés considerado el padre de la sociología y creador del positivismo? (1798-1857)',
        answer: ['Auguste Comte', 'comte', 'auguste'],
        studyContent: '<h3>Auguste Comte</h3><p><strong>Biografía:</strong> Nació en 1798 en Francia y murió en 1857. Fue un filósofo y sociólogo francés revolucionario.</p><p><strong>Legado:</strong> Es considerado el padre de la sociología moderna. Creó la corriente filosófica del positivismo, que enfatiza que el conocimiento proviene de la observación, experimentación y comprobación de hechos.</p><p><strong>Obra Fundamental:</strong> Desarrolló la "Ley de los Tres Estados" que describe las etapas por las que pasa la humanidad en su desarrollo.</p><p><strong>Objetivo:</strong> Lograr un orden en la sociedad mediante el conocimiento científico. Su lema fue "Orden y Progreso" (que aparece en la bandera brasileña).</p>'
      },
      {
        letter: 'B',
        question: '¿Cuál era el nombre del barco en el que Charles Darwin realizó su famoso viaje de 5 años (1831-1836) recolectando especímenes?',
        answer: ['Beagle', 'HMS Beagle', 'beagle'],
        studyContent: '<h3>El Viaje del Beagle</h3><p><strong>La Expedición (1831-1836):</strong> A bordo del HMS Beagle, Darwin recorrió América del Sur, las Islas Galápagos y Oceanía, recolectando muestras de fósiles y fauna viva durante 5 años.</p><p><strong>Descubrimientos Cruciales:</strong> La observación de variaciones en pinzones y tortugas según su isla se convirtió en prueba de que el entorno modifica la herencia biológica.</p><p><strong>Ciencia Basada en Evidencia:</strong> Frente a la tradición medieval que buscaba verdades fijas en textos sagrados, Darwin defendió la observación directa de la naturaleza.</p>'
      },
      {
        letter: 'C',
        question: '¿Cuál es el apellido del naturalista británico (1809-1882) que escribió "El Origen de las Especies" y revolucionó la ciencia biológica?',
        answer: ['Darwin', 'charles darwin', 'charles'],
        studyContent: '<h3>Charles Darwin - El Naturalista</h3><p><strong>Nacimiento e Identidad:</strong> Nació en Shrewsbury, Inglaterra (1809-1882). Reconocido como una figura clave que transformó por completo las ciencias biológicas.</p><p><strong>Formación Intelectual:</strong> Su interés por la geología y la recolección de especies creció gracias a su mentor John Henslow.</p><p><strong>Obras Influyentes:</strong> Autor de "El viaje del Beagle", "El origen del hombre" y la obra revolucionaria "El origen de las especies".</p>'
      },
      {
        letter: 'D',
        question: '¿Cuál es el apellido del sociólogo francés (1858-1917) fundador de la sociología moderna, conocido por sus "hechos sociales"?',
        answer: ['Durkheim', 'durkheim', 'émile durkheim'],
        studyContent: '<h3>Émile Durkheim</h3><p><strong>Biografía:</strong> Nació el 15 de abril de 1858 en Épinal y murió el 15 de noviembre de 1917 en París.</p><p><strong>Contribución Fundamental:</strong> Fue uno de los fundadores de la sociología moderna. Estudió cómo funciona la sociedad y cómo las personas se relacionan entre sí.</p><p><strong>Concepto Clave - Hechos Sociales:</strong> Durkheim definió los hechos sociales como fenómenos colectivos que influyen en el comportamiento individual. Utilizó métodos rigurosos para estudiar estos hechos.</p><p><strong>Legado:</strong> Consolidó la sociología como disciplina científica, influyendo en investigaciones posteriores y estableciendo métodos que aún son relevantes en el análisis social contemporáneo.</p>'

    class RoscoGame {
      constructor(data) {
        this.gameData = data;
        this.gameState = {
          correct: 0,
          skipped: 0,
          attempts: 0,
          usedLetters: new Set(),
          correctLetters: new Set(),
          skippedLetters: new Set(),
          incorrectLetters: new Set()
        };
        this.currentLetter = null;
        this.modal = document.getElementById('questionModal');
        this.studyModal = document.getElementById('studyModal');
        this.init();
      }

      init() {
        this.createStars();
        this.renderRosco();
        this.attachEventListeners();
        this.playSoundEffect('start');
      }

      createStars() {
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 100; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          starsContainer.appendChild(star);
        }
      }

      normalizeAnswer(answer) {
        return answer.toLowerCase().trim().replace(/á|à|ä/g, 'a').replace(/é|è|ë/g, 'e').replace(/í|ì|ï/g, 'i').replace(/ó|ò|ö/g, 'o').replace(/ú|ù|ü/g, 'u');
      }

      checkAnswerMatch(userAnswer, correctAnswers) {
        const normalized = this.normalizeAnswer(userAnswer);
        return correctAnswers.some(answer => this.normalizeAnswer(answer) === normalized);
      }

      renderRosco() {
        const circle = document.getElementById('roscoCircle');
        circle.innerHTML = '';

        const totalLetters = this.gameData.length;
        const radius = 280;
        const center = { x: 300, y: 300 };

        this.gameData.forEach((item, index) => {
          const angle = (index / totalLetters) * Math.PI * 2 - Math.PI / 2;
          const x = center.x + radius * Math.cos(angle);
          const y = center.y + radius * Math.sin(angle);

          const button = document.createElement('button');
          button.className = 'rosco-letter';
          button.textContent = item.letter;
          button.dataset.letter = item.letter;

          button.style.left = x + 'px';
          button.style.top = y + 'px';

          if (this.gameState.correctLetters.has(item.letter)) {
            button.classList.add('used');
            button.disabled = true;
          } else if (this.gameState.skippedLetters.has(item.letter)) {
            button.classList.add('skip');
            button.disabled = true;
          } else if (this.gameState.incorrectLetters.has(item.letter)) {
            button.classList.add('incorrect');
            button.disabled = true;
          }

          button.addEventListener('click', () => this.openQuestion(item.letter));
          circle.appendChild(button);
        });
      }

      openQuestion(letter) {
        if (this.gameState.usedLetters.has(letter)) return;

        const question = this.gameData.find(q => q.letter === letter);
        this.currentLetter = question;

        document.getElementById('modalLetter').textContent = letter;
        document.getElementById('modalTitle').textContent = `Pregunta ${letter}`;
        document.getElementById('questionText').textContent = question.question;
        document.getElementById('answerHint').innerHTML = `<strong>Respuesta esperada:</strong> ${question.answer.join(', ')}`;

        document.getElementById('answerInput').value = '';
        document.getElementById('resultMessage').textContent = '';
        document.getElementById('resultMessage').className = 'result-message';

        this.modal.classList.add('active');
        document.getElementById('answerInput').focus();
      }

      closeModal() {
        this.modal.classList.remove('active');
      }

      closeStudyModal() {
        this.studyModal.classList.remove('active');
      }

      createParticles(letter) {
        const letterEl = document.querySelector(`[data-letter="${letter}"]`);
        if (!letterEl) return;

        const rect = letterEl.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        for (let i = 0; i < 12; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.innerHTML = '<div class="particle-dot"></div>';

          const angle = (i / 12) * Math.PI * 2;
          const distance = 80;
          const tx = Math.cos(angle) * distance;
          const ty = Math.sin(angle) * distance;

          particle.style.left = x + 'px';
          particle.style.top = y + 'px';
          particle.style.setProperty('--tx', tx + 'px');
          particle.style.setProperty('--ty', ty + 'px');

          document.body.appendChild(particle);

          setTimeout(() => particle.remove(), 1000);
        }
      }

      checkAnswer(userAnswer) {
        if (!userAnswer.trim()) {
          this.showMessage('Por favor, escribe una respuesta', 'error');
          return;
        }

        const correct = this.checkAnswerMatch(userAnswer, this.currentLetter.answer);

        if (correct) {
          this.gameState.correct++;
          this.gameState.correctLetters.add(this.currentLetter.letter);
          this.gameState.usedLetters.add(this.currentLetter.letter);
          this.showMessage('✓ ¡CORRECTO! Respuesta acertada', 'success');
          this.playSoundEffect('success');
          this.createParticles(this.currentLetter.letter);

          setTimeout(() => {
            this.closeModal();
            this.updateUI();
            this.showStudyModal();
          }, 2500);
        } else {
          this.gameState.attempts++;
          this.showMessage(`✗ Incorrecto. Intenta nuevamente...`, 'error');
          this.playSoundEffect('error');
          document.getElementById('answerInput').value = '';
        }
      }

      showStudyModal() {
        const title = `${this.currentLetter.letter} - ${this.currentLetter.answer[0]}`;
        document.getElementById('studyTitle').textContent = title;
        document.getElementById('studyBody').innerHTML = this.currentLetter.studyContent;
        this.studyModal.classList.add('active');
      }

      skipQuestion() {
        this.gameState.skipped++;
        this.gameState.skippedLetters.add(this.currentLetter.letter);
        this.gameState.usedLetters.add(this.currentLetter.letter);
        this.closeModal();
        this.updateUI();
        this.playSoundEffect('skip');
      }

      showMessage(text, type) {
        const msgEl = document.getElementById('resultMessage');
        msgEl.textContent = text;
        msgEl.className = `result-message ${type}`;
      }

      updateUI() {
        document.getElementById('correctCount').textContent = `${this.gameState.correct}/26`;
        document.getElementById('skippedCount').textContent = this.gameState.skipped;
        document.getElementById('attemptsCount').textContent = this.gameState.attempts;

        const progress = (this.gameState.correct / 26) * 100;
        document.getElementById('progressFill').style.width = progress + '%';

        this.renderRosco();

        if (this.gameState.correct === 26) {
          this.showCompletion();
        }
      }

      showCompletion() {
        const completionMsg = document.getElementById('completionMessage');
        completionMsg.classList.add('show');
        this.createMedusas();
        this.playSoundEffect('completion');
      }

      createMedusas() {
        const body = document.body;
        for (let i = 0; i < 40; i++) {
          setTimeout(() => {
            const medusa = document.createElement('div');
            medusa.className = 'medusa';
            medusa.style.left = Math.random() * 100 + '%';
            medusa.style.top = '-100px';

            medusa.innerHTML = `
              <div class="medusa-body"></div>
              <div class="medusa-tentacle"></div>
              <div class="medusa-tentacle" style="left: 30%;"></div>
              <div class="medusa-tentacle" style="left: 70%;"></div>
            `;

            body.appendChild(medusa);
            setTimeout(() => medusa.remove(), 8000);
          }, i * 200);
        }
      }

      playSoundEffect(type) {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        if (type === 'success') {
          const now = audioContext.currentTime;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);

          osc.frequency.setValueAtTime(523.25, now);
          osc.frequency.setValueAtTime(659.25, now + 0.15);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'error') {
          const now = audioContext.currentTime;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);

          osc.frequency.setValueAtTime(200, now);
          osc.frequency.setValueAtTime(100, now + 0.2);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
        } else if (type === 'completion') {
          const notes = [523.25, 659.25, 783.99];
          notes.forEach((freq, i) => {
            const now = audioContext.currentTime + i * 0.3;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(freq, now);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
          });
        }
      }

      attachEventListeners() {
        document.getElementById('submitBtn').addEventListener('click', () => {
          const answer = document.getElementById('answerInput').value;
          this.checkAnswer(answer);
        });

        document.getElementById('answerInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const answer = document.getElementById('answerInput').value;
            this.checkAnswer(answer);
          }
        });

        document.getElementById('skipBtn').addEventListener('click', () => {
          this.skipQuestion();
        });

        document.getElementById('closeStudyBtn').addEventListener('click', () => {
          this.closeStudyModal();
        });

        this.modal.addEventListener('click', (e) => {
          if (e.target === this.modal) {
            this.closeModal();
          }
        });
      }
    }

    const game = new RoscoGame(gameData);
  </script>
</body>
</html>
