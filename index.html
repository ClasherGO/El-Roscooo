
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>рҹҺҜ Rosco Гүpico - Grandes Pensadores</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

    * { box-sizing: border-box; }
    
    body { 
      margin: 0; 
      padding: 1rem; 
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh;
      overflow: hidden;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .flying-cane {
      position: fixed;
      font-size: 80px;
      top: 50%;
      animation: flyAcross 6s linear infinite;
      z-index: 2;
      opacity: 0.6;
      filter: grayscale(100%);
    }

    .flying-cane.right {
      animation: flyAcrossRight 6s linear infinite;
    }

    @keyframes flyAcross {
      0% { left: -100px; }
      100% { left: 100vw; }
    }

    @keyframes flyAcrossRight {
      0% { right: -100px; }
      100% { right: 100vw; }
    }

    .jellyfish {
      position: fixed;
      font-size: 60px;
      animation: jellyFloat 8s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes jellyFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      50% { transform: translateY(-100px) rotate(20deg); opacity: 0.8; }
    }

    .titulo {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 2rem;
      color: white;
    }

    .titulo h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .titulo p {
      margin: 0.5rem 0 0 0;
      font-size: 16px;
      color: rgba(255,255,255,0.8);
      font-weight: 300;
      animation: fadeIn 1.2s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .controls-top {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    
    .mode-button {
      padding: 12px 28px;
      font-size: 15px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .mode-button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    
    .mode-button.active {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border-color: #2ecc71;
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
    }

    .rosco-container { 
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex; 
      flex-direction: column; 
      gap: 2rem;
      position: relative;
      z-index: 1;
    }
    
    .rosco-circle {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      perspective: 1000px;
    }
    
    .rosco-svg {
      width: 100%;
      height: 100%;
      cursor: pointer;
      filter: drop-shadow(0 8px 30px rgba(0,0,0,0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .question-box {
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 2rem;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .question-text {
      font-size: 18px;
      color: #2c3e50;
      margin-bottom: 1.5rem;
      line-height: 1.6;
      font-weight: 500;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    
    .answer-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.3s;
    }
    
    .answer-input:focus {
      outline: none;
      border-color: #2ecc71;
      box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2);
      transform: scale(1.02);
    }
    
    .answer-input:disabled {
      background: #f5f5f5;
      color: #999;
      cursor: not-allowed;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .button-group button {
      padding: 12px;
      font-size: 15px;
      border: 2px solid transparent;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .button-group button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
    }
    
    .button-group button:active:not(:disabled) {
      transform: translateY(-1px);
    }
    
    .button-group button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .feedback {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 12px;
      font-size: 15px;
      text-align: center;
      font-weight: 600;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .feedback.correct {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border-left: 5px solid #229954;
      box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
    }

    .feedback.incorrect {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border-left: 5px solid #a93226;
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }

    .score-display {
      font-size: 16px;
      color: white;
      margin-top: 1.5rem;
      text-align: center;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(46,204,113,0.8), rgba(39,174,96,0.8));
      border-radius: 12px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .letter-selected {
      font-size: 18px;
      font-weight: 700;
      color: #2ecc71;
      margin-bottom: 0.75rem;
    }

    .intento-counter {
      font-size: 13px;
      color: #e74c3c;
      margin-top: 0.75rem;
      font-weight: 600;
    }

    .exposition-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,255,255,0.95));
      border-radius: 25px;
      padding: 2.5rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      z-index: 1000;
      animation: modalAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.5);
    }

    @keyframes modalAppear {
      to {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes modalDisappear {
      from {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
      }
    }

    .exposition-modal.hide {
      animation: modalDisappear 0.4s ease forwards;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-modal:hover {
      transform: scale(1.1) rotate(90deg);
    }

    .modal-letter {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .modal-question {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .modal-answer {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 1rem;
      background-color: rgba(46,204,113,0.1);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      border-left: 5px solid #2ecc71;
    }

    .modal-explanation {
      font-size: 14px;
      line-height: 1.7;
      color: #34495e;
      max-height: 200px;
      overflow-y: auto;
    }

    .exposition-mode {
      display: none;
    }

    .exposition-mode.active {
      display: block;
    }

    .interactive-mode {
      display: block;
    }

    .interactive-mode.hidden {
      display: none;
    }

    .letter-circle {
      transition: all 0.3s ease;
    }

    .letter-circle circle {
      fill: #cccccc;
      transition: all 0.4s ease;
    }

    .letter-circle text {
      fill: #666666;
      font-weight: 700;
      transition: all 0.4s ease;
    }

    .letter-circle:hover circle:not(.solved circle) {
      filter: brightness(1.1);
    }

    .letter-circle.solved circle {
      fill: #2ecc71 !important;
      stroke: #27ae60 !important;
      filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.8));
    }

    .letter-circle.solved text {
      fill: white !important;
      font-weight: 900;
    }

    .green-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(46, 204, 113, 0.8);
    }

    @keyframes particleFloat {
      to {
        transform: translateY(-150px) translateX(var(--tx)) rotateZ(360deg);
        opacity: 0;
      }
    }

    .sound-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s;
      z-index: 100;
    }

    .sound-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .sound-toggle.muted {
      background: linear-gradient(135deg, #95a5a6, #7f8c8d);
    }

    .final-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      padding: 3rem;
      border-radius: 25px;
      text-align: center;
      z-index: 999;
      font-size: 32px;
      font-weight: 900;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="titulo">
  <h1>рҹҺҜ ROSCO ГүPICO</h1>
  <p>Grandes Pensadores de la Modernidad</p>
</div>

<div class="controls-top">
  <button class="mode-button active" id="btn-modo-juego">рҹҺ® Juego</button>
  <button class="mode-button" id="btn-modo-exposicion">рҹ“ҡ Estudio</button>
</div>

<button class="sound-toggle" id="sound-toggle">рҹ”Ҡ</button>

<div class="rosco-container">
  <div class="interactive-mode" id="interactive-section">
    <div class="rosco-circle">
      <svg class="rosco-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
          </filter>
        </defs>
        
        <circle cx="200" cy="200" r="65" fill="#666666" stroke="white" stroke-width="3" filter="url(#shadow)"/>
        <text x="200" y="215" text-anchor="middle" font-size="40" font-weight="900" fill="white" id="center-letter">A</text>
        
        <g id="letters"></g>
      </svg>
    </div>
    
    <div class="question-box">
      <div>
        <div class="letter-selected" id="letter-display">Letra A</div>
        <div class="question-text" id="question-text">Haz clic en una letra para comenzar</div>
      </div>
      
      <div>
        <div class="input-group">
          <input type="text" class="answer-input" id="answer-input" placeholder="Escribe tu respuesta...">
        </div>
        <div class="button-group">
          <button id="btn-check">вң“ Comprobar</button>
          <button id="btn-skip">вҠҳ Saltar</button>
        </div>
        <div id="feedback"></div>
        <div class="intento-counter" id="intento-counter"></div>
      </div>
      
      <div class="score-display" id="score-display">рҹҺҜ Aciertos: 0 / 0</div>
    </div>
  </div>

  <div class="exposition-mode" id="exposition-section">
    <p style="color: white; text-align: center;">рҹ“ҡ Modo Estudio activado</p>
  </div>
</div>

<div class="exposition-modal" id="exposition-modal" style="transform: translate(-50%, -50%) scale(0);">
  <button class="close-modal" id="close-modal">вң•</button>
  <div class="modal-letter" id="modal-letter">A</div>
  <div class="modal-question" id="modal-question">Pregunta</div>
  <div class="modal-answer" id="modal-answer">RESPUESTA</div>
  <div class="modal-explanation" id="modal-explanation">ExplicaciГіn detallada</div>
</div>

<script>
  // ========== AUDIO CONTEXT ==========
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  let soundEnabled = true;

  function playSound(frequency, duration, type = 'sine') {
    if (!soundEnabled) return;
    
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(audioContext.destination);
    
    osc.frequency.value = frequency;
    osc.type = type;
    
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
    
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + duration);
  }

  function playSoundCorrect() {
    playSound(523.25, 0.1);
    setTimeout(() => playSound(659.25, 0.1), 100);
    setTimeout(() => playSound(783.99, 0.2), 200);
  }

  function playSoundIncorrect() {
    playSound(200, 0.1);
    setTimeout(() => playSound(150, 0.2), 100);
  }

  function playSoundClick() {
    playSound(400, 0.05);
  }

  // ========== ESTRELLAS ==========
  function createStars() {
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  }

  // ========== CANES CORSO VOLADORES ==========
  let caneInterval = null;

  function createFlyingCanes() {
    caneInterval = setInterval(() => {
      const cane = document.createElement('div');
      cane.className = 'flying-cane';
      cane.textContent = 'рҹҗ•';
      cane.style.top = Math.random() * 80 + 10 + '%';
      
      if (Math.random() > 0.5) {
        cane.classList.add('right');
        cane.style.right = '-100px';
      } else {
        cane.style.left = '-100px';
      }
      
      document.body.appendChild(cane);
      setTimeout(() => cane.remove(), 6000);
    }, 12000);
  }

  // ========== MEDUSAS FINALES ==========
  function createJellyfishes() {
    for (let i = 0; i < 100; i++) {
      const jellyfish = document.createElement('div');
      jellyfish.className = 'jellyfish';
      jellyfish.textContent = 'рҹӘј';
      jellyfish.style.left = Math.random() * 100 + 'vw';
      jellyfish.style.top = Math.random() * 100 + 'vh';
      jellyfish.style.filter = 'hue-rotate(270deg)';
      jellyfish.style.animationDelay = Math.random() * 8 + 's';
      jellyfish.style.animationDuration = (6 + Math.random() * 4) + 's';
      document.body.appendChild(jellyfish);
    }
  }

  // ========== PARTICULAS VERDES ==========
  function createGreenParticles(x, y) {
    for (let i = 0; i < 15; i++) {
      const particle = document.createElement('div');
      particle.className = 'green-particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      
      const angle = (i / 15) * Math.PI * 2;
      const distance = 50 + Math.random() * 50;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;
      
      particle.style.setProperty('--tx', tx + 'px');
      particle.style.animation = `particleFloat ${0.8 + Math.random() * 0.4}s ease-out forwards`;
      
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 1200);
    }
  }

  // ========== DATOS DE PREGUNTAS ==========
  const preguntas = {
    'A': { pregunta: 'ВҝQuiГ©n fue el padre del socialismo cientГӯfico?', respuesta: 'MARX', respuestas_alt: ['Karl Marx', 'Karl', 'Marx'], explicacion: 'Karl Marx fue un filГіsofo y economista alemГЎn que revolucionГі el pensamiento social al crear el concepto del socialismo cientГӯfico, basado en el anГЎlisis material e histГіrico de la sociedad.' },
    'B': { pregunta: 'Viaje de 5 aГұos en el que Darwin recopilГі datos biolГіgicos', respuesta: 'BEAGLE', respuestas_alt: ['HMS Beagle', 'Viaje del Beagle', 'HMS', 'Beagle'], explicacion: 'El viaje del HMS Beagle (1831-1836) fue fundamental para Darwin, permitiГ©ndole recopilar especГӯmenes y observaciones que sentarГӯan las bases de su teorГӯa de la evoluciГіn.' },
    'C': { pregunta: 'ВҝQuiГ©n propuso la teorГӯa de la "Ley de los tres estados"?', respuesta: 'COMTE', respuestas_alt: ['Auguste Comte', 'Auguste', 'Comte'], explicacion: 'Auguste Comte dividiГі la evoluciГіn del conocimiento humano en tres estados: teolГіgico, metafГӯsico y positivo, cada uno representando un avance en el pensamiento racional.' },
    'D': { pregunta: 'ВҝQuГ© sociГіlogo francГ©s creГі el concepto de "Hechos Sociales"?', respuesta: 'DURKHEIM', respuestas_alt: ['Гүmile Durkheim', 'Emile', 'Durkheim'], explicacion: 'Гүmile Durkheim definiГі los hechos sociales como fenГіmenos colectivos que influyen en el comportamiento individual, sentando las bases de la sociologГӯa moderna.' },
    'E': { pregunta: 'Corriente filosГіfica creada por Comte basada en la observaciГіn', respuesta: 'EMPIRISMO', respuestas_alt: ['Positivismo', 'Empiricismo'], explicacion: 'El positivismo de Comte enfatiza la importancia de la observaciГіn y la experiencia como base del conocimiento cientГӯfico, rechazando las explicaciones puramente teГіricas.' },
    'F': { pregunta: 'ВҝEn quГ© paГӯs naciГі Marx?', respuesta: 'FILOSOFIA', respuestas_alt: ['Alemania', 'Prusia', 'TrГ©veris', 'Francia', 'Alemania'], explicacion: 'Marx naciГі en TrГ©veris, Prusia (actualmente Alemania), en 1818. Su formaciГіn filosГіfica fue decisiva para su posterior desarrollo del materialismo histГіrico.' },
    'G': { pregunta: 'Islas donde Darwin observГі variaciones en pinzones y tortugas', respuesta: 'GALAPAGOS', respuestas_alt: ['GalГЎpagos', 'Islas GalГЎpagos', 'GalГЎpagos'], explicacion: 'Las Islas GalГЎpagos fueron cruciales para Darwin. Las variaciones que observГі entre los pinzones de diferentes islas lo inspiraron a desarrollar su teorГӯa de selecciГіn natural.' },

    'J': { pregunta: 'Darwin publicГі un libro famoso sobre: "El origen del..."', respuesta: 'JUNGLA', respuestas_alt: ['especies', 'hombre', 'origen', 'vida'], explicacion: 'La obra mГЎs importante de Darwin fue "El origen de las especies" (1859), donde presentГі su teorГӯa de la evoluciГіn por selecciГіn natural, revolucionando la biologГӯa.' },
    'K': { pregunta: 'ВҝCuГЎl es el apellido del filГіsofo alemГЎn creador del materialismo histГіrico?', respuesta: 'KARL', respuestas_alt: ['Marx', 'Marx Karl'], explicacion: 'Karl Marx fue un pensador alemГЎn cuyas teorГӯas sobre la historia material transformaron el pensamiento polГӯtico y social del mundo contemporГЎneo.' },
    'L': { pregunta: 'Concepto marxista fundamental sobre el conflicto entre clases sociales', respuesta: 'LUCHA', respuestas_alt: ['Lucha de clases', 'Conflicto'], explicacion: 'La lucha de clases es el concepto central del marxismo, donde Marx propone que la historia es impulsada por los conflictos entre diferentes clases sociales econГіmicamente definidas.' },
    'M': { pregunta: 'TeorГӯa de Marx sobre el anГЎlisis de la historia y sociedad', respuesta: 'MATERIALISMO', respuestas_alt: ['Materialismo histГіrico', 'Materialismo'], explicacion: 'El materialismo histГіrico de Marx sostiene que la base econГіmica de una sociedad determina su estructura polГӯtica e ideolГіgica, rechazando explicaciones idealistas de la historia.' },
    'N': { pregunta: 'ВҝCuГЎl fue la obra naturalista mГЎs importante de Darwin?', respuesta: 'NATURALISTA', respuestas_alt: ['El origen de las especies', 'Origen'], explicacion: 'Darwin fue un naturalista cuya obra "El origen de las especies" revolucionГі nuestra comprensiГіn de la vida en la Tierra, proponiendo la evoluciГіn como mecanismo de cambio biolГіgico.' },
    'O': { pregunta: 'Palabra clave en la filosofГӯa de Comte: "Orden y..."', respuesta: 'ORDEN', respuestas_alt: ['Orden y Progreso', 'Progreso'], explicacion: 'La divisa de Comte "Orden y Progreso" resume su visiГіn de que la sociedad debe basarse en principios cientГӯficos para alcanzar el progreso mientras mantiene un orden estable.' },
    'P': { pregunta: 'ВҝCorriente filosГіfica que busca conocimiento a travГ©s de la observaciГіn?', respuesta: 'POSITIVISMO', respuestas_alt: ['Positivismo'], explicacion: 'El positivismo es la corriente filosГіfica creada por Comte que considera vГЎlido solo el conocimiento que puede ser verificado mediante la observaciГіn empГӯrica y la experiencia.' },
    'Q': { pregunta: 'Marx criticaba los sistemas que buscaban..., generando explotaciГіn', respuesta: 'QUIMICA', respuestas_alt: ['quГӯmica', 'capitalismo', 'dinero', 'ganancias'], explicacion: 'Marx fue un crГӯtico feroz del capitalismo, denunciando cГіmo el sistema econГіmico genera explotaciГіn laboral y concentraciГіn de riqueza en manos de pocos propietarios.' },
    'R': { pregunta: 'Darwin realizГі investigaciones de... durante su viaje', respuesta: 'RECOLECCION', respuestas_alt: ['recolecciГіn', 'observaciГіn', 'recogida', 'coleccion'], explicacion: 'Durante el viaje del Beagle, Darwin se dedicГі a la recolecciГіn sistemГЎtica de especГӯmenes biolГіgicos y fГіsiles, registrando meticulosamente sus observaciones de la naturaleza.' },

    'U': { pregunta: 'ВҝEn quГ© universidad estudiГі Darwin biologГӯa y geologГӯa?', respuesta: 'UNIVERSIDAD', respuestas_alt: ['Cambridge', 'Cambridge University'], explicacion: 'Darwin estudiГі en la Universidad de Cambridge, donde bajo la mentorГӯa de John Henslow desarrollГі su pasiГіn por las ciencias naturales.' },
    'V': { pregunta: 'Aspecto fundamental de la teorГӯa de Darwin: diferencias genГ©ticas', respuesta: 'VARIABILIDAD', respuestas_alt: ['VariaciГіn', 'Variables', 'Variacion genetica'], explicacion: 'La variabilidad es fundamental en la teorГӯa de Darwin. Sin variaciГіn genГ©tica en las poblaciones, la selecciГіn natural no tendrГӯa material sobre el cual actuar.' },
    'W': { pregunta: 'Marx pasГі aГұos exiliado en Londres escribiendo sobre este concepto', respuesta: 'WORK', respuestas_alt: ['trabajo', 'obra'], explicacion: 'Marx pasГі gran parte de su vida en Londres, donde escribiГі extensamente sobre el trabajo, la explotaciГіn laboral y las contradicciones del capitalismo industrial.' },
    'X': { pregunta: 'TeorГӯa que analiza relaciones complejas en la sociedad', respuesta: 'XENIAL', respuestas_alt: ['compleja', 'analisis'], explicacion: 'Los pensadores modernos desarrollaron teorГӯas complejas que analizan las mГәltiples dimensiones de la sociedad: econГіmica, polГӯtica, social y cultural.' },
    'Y': { pregunta: 'ВҝA partir de quГ© se desarrollГі el pensamiento moderno?', respuesta: 'YACIMIENTOS', respuestas_alt: ['humanismo'], explicacion: 'El pensamiento moderno se desarrollГі a partir del Renacimiento y la IlustraciГіn, valorando la razГіn, la observaciГіn empГӯrica y el anГЎlisis crГӯtico de la realidad.' },
    'Z': { pregunta: 'Las GalГЎpagos se ubicaban en la... tropical ecuatorial', respuesta: 'ZONA', respuestas_alt: ['zona', 'ecuatorial'], explicacion: 'Las Islas GalГЎpagos estГЎn ubicadas en la zona ecuatorial del OcГ©ano PacГӯfico, lo que proporciona un ambiente Гәnico con biodiversidad caracterГӯstica de regiones tropicales.' }
  };

  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  let letraActual = 0;
  let aciertos = 0;
  let totalPreguntas = 0;
  let intentosActual = 0;
  let respondida = false;
  let letrasResueltas = new Set();
  let elementosLetras = {};
  let modalTimeout = null;

  function normalizarRespuesta(texto) {
    return texto.toUpperCase().trim().replace(/ГЎ|Г |ГӨ/g, 'a').replace(/Г©|ГЁ|Г«/g, 'e').replace(/Гӯ|Г¬|ГҜ/g, 'i').replace(/Гі|ГІ|Г¶/g, 'o').replace(/Гә|Г№|Гј/g, 'u');
  }

  function dibujarRosco() {
    const svg = document.getElementById('letters');
    const radio = 150;

    letras.forEach((letra, i) => {
      const angulo = (i / 26) * Math.PI * 2 - Math.PI / 2;
      const x = 200 + radio * Math.cos(angulo);
      const y = 200 + radio * Math.sin(angulo);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.style.cursor = 'pointer';
      g.classList.add('letter-circle');
      
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', 26);
      circle.setAttribute('fill', '#cccccc');
      circle.setAttribute('stroke', '#999999');
      circle.setAttribute('stroke-width', '2');
      circle.setAttribute('filter', 'url(#shadow)');
      
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y + 8);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '20');
      text.setAttribute('font-weight', '700');
      text.setAttribute('fill', '#666666');
      text.textContent = letra;

      g.appendChild(circle);
      g.appendChild(text);
      g.addEventListener('click', () => {
        playSoundClick();
        seleccionarLetra(i);
      });
      
      elementosLetras[letra] = g;
      svg.appendChild(g);
    });
  }

  function iluminarLetra(letra) {
    if (elementosLetras[letra]) {
      const circle = elementosLetras[letra].querySelector('circle');
      const rect = circle.getBoundingClientRect();
      createGreenParticles(rect.x + rect.width / 2, rect.y + rect.height / 2);
      elementosLetras[letra].classList.add('solved');
    }
  }

  function seleccionarLetra(indice) {
    letraActual = indice;
    const letra = letras[indice];
    
    if (letrasResueltas.has(letra)) return;
    
    respondida = false;
    intentosActual = 0;
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').innerHTML = '';
    mostrarPregunta();
  }

  function mostrarPregunta() {
    const letra = letras[letraActual];
    const pregunta = preguntas[letra];
    
    document.getElementById('center-letter').textContent = letra;
    document.getElementById('letter-display').textContent = `рҹҺҜ Letra ${letra}`;
    document.getElementById('question-text').textContent = pregunta.pregunta;
    document.getElementById('answer-input').focus();
    document.getElementById('answer-input').disabled = false;
    document.getElementById('intento-counter').textContent = '';
  }

  function mostrarModalEstudio() {
    const letra = letras[letraActual];
    const datos = preguntas[letra];
    
    document.getElementById('modal-letter').textContent = letra;
    document.getElementById('modal-question').textContent = datos.pregunta;
    document.getElementById('modal-answer').textContent = datos.respuesta;
    document.getElementById('modal-explanation').textContent = datos.explicacion;
    
    const modal = document.getElementById('exposition-modal');
    modal.classList.remove('hide');
    modal.style.transform = 'translate(-50%, -50%) scale(1)';
  }

  function cerrarModalEstudio() {
    const modal = document.getElementById('exposition-modal');
    modal.classList.add('hide');
    setTimeout(() => {
      modal.style.transform = 'translate(-50%, -50%) scale(0)';
    }, 400);
  }

  function comprobarRespuesta() {
    if (respondida) return;
    
    const respuesta = document.getElementById('answer-input').value;
    const letra = letras[letraActual];
    const datos = preguntas[letra];
    
    const respuestaNormalizada = normalizarRespuesta(respuesta);
    const correcta = normalizarRespuesta(datos.respuesta);
    const alternativas = datos.respuestas_alt.map(r => normalizarRespuesta(r));
    
    intentosActual++;
    
    const esCorrecta = respuestaNormalizada === correcta || alternativas.includes(respuestaNormalizada);
    
    if (esCorrecta) {
      respondida = true;
      aciertos++;
      totalPreguntas++;
      letrasResueltas.add(letra);
      iluminarLetra(letra);
      playSoundCorrect();
      mostrarFeedback(true, `рҹҺү ВЎCORRECTO! ${datos.respuesta} (Intento ${intentosActual})`);
      document.getElementById('answer-input').disabled = true;
      
      // Mostrar modal despuГ©s de 4 segundos
      if (modalTimeout) clearTimeout(modalTimeout);
      modalTimeout = setTimeout(mostrarModalEstudio, 4000);
      
      // Cerrar modal despuГ©s de 12 segundos
      setTimeout(() => cerrarModalEstudio(), 16000);
      
      // Verificar si es el Гәltimo
      if (aciertos === 26) {
        setTimeout(() => {
          const finalMsg = document.createElement('div');
          finalMsg.className = 'final-message';
          finalMsg.textContent = 'ВЎрҹҺҠ ВЎFELICIDADES! ВЎCOMPLETASTE EL ROSCO! рҹҺҠ';
          document.body.appendChild(finalMsg);
          setTimeout(() => createJellyfishes(), 500);
          setTimeout(() => finalMsg.remove(), 4000);
        }, 16500);
      }
    } else {
      playSoundIncorrect();
      mostrarFeedback(false, `вқҢ Incorrecto. Intenta de nuevo (Intento ${intentosActual})`);
      document.getElementById('intento-counter').textContent = `вҡ пёҸ Intentos: ${intentosActual}`;
      document.getElementById('answer-input').value = '';
      document.getElementById('answer-input').focus();
    }
    
    if (respondida) {
      actualizarScore();
    }
  }

  function saltarPregunta() {
    if (respondida) return;
    
    respondida = true;
    totalPreguntas++;
    const letra = letras[letraActual];
    const datos = preguntas[letra];
    mostrarFeedback(false, `вҸӯпёҸ Saltada. La respuesta es ${datos.respuesta}`);
    document.getElementById('answer-input').disabled = true;
    actualizarScore();
  }

  function mostrarFeedback(esCorrecta, mensaje) {
    const fb = document.getElementById('feedback');
    fb.className = `feedback ${esCorrecta ? 'correct' : 'incorrect'}`;
    fb.textContent = mensaje;
  }

  function actualizarScore() {
    document.getElementById('score-display').textContent = `рҹҺҜ Aciertos: ${aciertos} / ${totalPreguntas}`;
  }

  // Event Listeners
  document.getElementById('btn-check').addEventListener('click', comprobarRespuesta);
  document.getElementById('btn-skip').addEventListener('click', saltarPregunta);
  document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !respondida) comprobarRespuesta();
  });

  document.getElementById('close-modal').addEventListener('click', cerrarModalEstudio);

  document.getElementById('sound-toggle').addEventListener('click', function() {
    soundEnabled = !soundEnabled;
    this.classList.toggle('muted');
    this.textContent = soundEnabled ? 'рҹ”Ҡ' : 'рҹ”Ү';
  });

  // Initialize
  createStars();
  createFlyingCanes();
  dibujarRosco();
</script>
