<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosco Interactivo - Modo Exposición</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a3a4a 50%, #0f1f2f 100%);
      min-height: 100vh;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.5rem;
      margin: 0;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .header p {
      font-size: 1.1rem;
      margin: 0.5rem 0 0 0;
      opacity: 0.9;
    }

    /* LAYOUT PRINCIPAL */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    /* ROSCO */
    .rosco-section {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rosco-canvas {
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      padding: 20px;
    }

    .rosco-svg {
      width: 100%;
      height: 100%;
    }

    /* PANEL DE JUEGO */
    .game-panel {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .question-section {
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .letter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
      border-radius: 50%;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0a1428;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .question-hint {
      font-size: 0.95rem;
      color: #666;
      font-style: italic;
    }

    /* INPUT Y BOTONES */
    .input-section {
      display: flex;
      gap: 0.75rem;
    }

    .answer-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-family: inherit;
      transition: all 0.3s;
    }

    .answer-input:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    button {
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-verify {
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
    }

    .btn-verify:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
    }

    .btn-skip {
      background: #f5f5f5;
      color: #333;
      border: 2px solid #ddd;
    }

    .btn-skip:hover:not(:disabled) {
      background: #e8e8e8;
      border-color: #999;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* FEEDBACK */
    .feedback {
      padding: 1rem;
      border-radius: 10px;
      font-weight: 600;
      text-align: center;
      font-size: 1rem;
      min-height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .feedback.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .feedback.incorrect {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }

    .feedback.hidden {
      visibility: hidden;
    }

    /* SCORE */
    .score-board {
      background: linear-gradient(135deg, #f0f4f8, #d9e8f5);
      padding: 1.5rem;
      border-radius: 10px;
      text-align: center;
    }

    .score-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .score-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #4a90e2;
    }

    /* MODAL DE INFORMACIÓN */
    .info-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
      padding: 2rem;
    }

    .info-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .info-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: cardAppear 0.4s ease;
    }

    @keyframes cardAppear {
      from {
        transform: scale(0.9) translateY(-30px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-letter-badge {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #28a745, #1e7e34);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .info-header-text h3 {
      margin: 0;
      color: #0a1428;
      font-size: 1.4rem;
    }

    .info-header-text p {
      margin: 0.5rem 0 0 0;
      color: #666;
      font-size: 0.95rem;
    }

    .info-answer {
      background: linear-gradient(135deg, #d4edda, #c3e6cb);
      border-left: 5px solid #28a745;
      padding: 1.5rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
    }

    .info-answer-label {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .info-answer-text {
      font-size: 2.2rem;
      font-weight: 700;
      color: #155724;
    }

    .info-explanation {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #333;
      margin-bottom: 2rem;
    }

    .info-footer {
      display: flex;
      gap: 1rem;
    }

    .btn-continue {
      flex: 1;
      background: linear-gradient(135deg, #28a745, #1e7e34);
      color: white;
      padding: 14px 20px;
      font-size: 1.05rem;
    }

    .btn-continue:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .rosco-canvas {
        max-width: 400px;
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .question-text {
        font-size: 1.2rem;
      }

      .rosco-canvas {
        max-width: 300px;
      }

      .button-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  // ============ VARIABLES GLOBALES ============
  const letras = Object.keys(preguntas).sort();
  let letraActual = null;
  let aciertos = 0;

  // ============ FUNCIONES AUXILIARES ============
  
  function levenshteinDistance(a, b) {
    a = a.toLowerCase().trim();
    b = b.toLowerCase().trim();
    const matrix = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(0));

    for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
    for (let j = 0; j <= b.length; j++) matrix[j][0] = j;

    for (let j = 1; j <= b.length; j++) {
      for (let i = 1; i <= a.length; i++) {
        const indicator = a[i - 1] === b[j - 1] ? 0 : 1;
        matrix[j][i] = Math.min(
          matrix[j][i - 1] + 1,
          matrix[j - 1][i] + 1,
          matrix[j - 1][i - 1] + indicator
        );
      }
    }
    return matrix[b.length][a.length];
  }

  function normalizarRespuesta(texto) {
    return texto.toUpperCase().trim()
      .replace(/á|à|ä/g, 'a').replace(/é|è|ë/g, 'e')
      .replace(/í|ì|ï/g, 'i').replace(/ó|ò|ö/g, 'o')
      .replace(/ú|ù|ü/g, 'u');
  }

  function verificarRespuesta(respuesta, respuestaCorrecta, alternativas) {
    const respNormalizada = normalizarRespuesta(respuesta);
    const correctaNormalizada = normalizarRespuesta(respuestaCorrecta);
    
    if (respNormalizada === correctaNormalizada) return true;
    
    for (let alt of alternativas) {
      if (respNormalizada === normalizarRespuesta(alt)) return true;
    }

    // Fuzzy matching: permite 1 carácter de error máximo
    const maxError = Math.ceil(respuestaCorrecta.length * 0.15); // 15% del largo
    if (levenshteinDistance(respNormalizada, correctaNormalizada) <= maxError) return true;

    return false;
  }

  // ============ DIBUJAR ROSCO ============
  function dibujarRosco() {
    const svg = document.getElementById('letters');
    const radio = 140;
    const colores = ['#888888', '#888888', '#888888', '#888888', '#888888', '#888888'];

    letras.forEach((letra, i) => {
      const angulo = (i / letras.length) * Math.PI * 2 - Math.PI / 2;
      const x = 200 + radio * Math.cos(angulo);
      const y = 200 + radio * Math.sin(angulo);
      const color = colores[i % colores.length];

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.style.cursor = 'pointer';
      g.classList.add('letter-circle');
      g.id = `letter-${letra}`;
      
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', 28);
      circle.setAttribute('fill', color);
      circle.setAttribute('stroke', 'white');
      circle.setAttribute('stroke-width', '2');
      circle.setAttribute('filter', 'url(#shadow)');
      circle.classList.add('letter-circle-shape');
      
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y + 10);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '22');
      text.setAttribute('font-weight', '700');
      text.setAttribute('fill', 'white');
      text.textContent = letra;

      g.appendChild(circle);
      g.appendChild(text);
      g.addEventListener('click', () => seleccionarLetra(letra));
      
      svg.appendChild(g);
    });
  }

  function iluminarLetra(letra) {

      circle.setAttribute('fill', '#28a745');
      circle.setAttribute('stroke', '#1e7e34');
    }
  }

  // ============ CONTROL DE JUEGO ============
  function seleccionarLetra(letra) {
    if (letrasResueltas.has(letra)) return;

    letraActual = letra;
    const datos = preguntas[letra];

    document.getElementById('center-letter').textContent = letra;
    document.getElementById('letter-badge').textContent = letra;
    document.getElementById('question-text').textContent = datos.pregunta.replace(`[${letra}]`, '').trim();
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').disabled = false;
    document.getElementById('answer-input').focus();
    document.getElementById('feedback').classList.add('hidden');
    document.getElementById('btn-verify').disabled = false;
    document.getElementById('btn-skip').disabled = false;
  }

  function comprobarRespuesta() {
    if (!letraActual) return;

    const respuesta = document.getElementById('answer-input').value;
    const datos = preguntas[letraActual];
    const esCorrecta = verificarRespuesta(respuesta, datos.respuesta, datos.respuestas_alt);

    const feedback = document.getElementById('feedback');

    if (esCorrecta) {
      aciertos++;
      letrasResueltas.add(letraActual);
      iluminarLetra(letraActual);
      
      feedback.classList.remove('hidden', 'incorrect');
      feedback.classList.add('correct');
      feedback.textContent = `✓ ¡Correcto! La respuesta es ${datos.respuesta}`;

      document.getElementById('answer-input').disabled = true;
      document.getElementById('btn-verify').disabled = true;
      document.getElementById('btn-skip').disabled = true;

      actualizarScore();

      // Mostrar modal después de 3 segundos
      if (modalTimeout) clearTimeout(modalTimeout);
      modalTimeout = setTimeout(() => mostrarModalInfo(), 3000);
    } else {
      feedback.classList.remove('hidden', 'correct');
      feedback.classList.add('incorrect');
      feedback.textContent = '✗ Incorrecto. Intenta nuevamente.';
      document.getElementById('answer-input').value = '';
      document.getElementById('answer-input').focus();
    }
  }

  function saltarPregunta() {
    const feedback = document.getElementById('feedback');
    const datos = preguntas[letraActual];
    
    feedback.classList.remove('hidden', 'correct');
    feedback.classList.add('incorrect');
    feedback.textContent = `Saltada. La respuesta correcta era: ${datos.respuesta}`;

    document.getElementById('answer-input').disabled = true;
    document.getElementById('btn-verify').disabled = true;
    document.getElementById('btn-skip').disabled = true;
  }

  function mostrarModalInfo() {
    const letra = letraActual;
    const datos = preguntas[letra];

    document.getElementById('info-letter').textContent = letra;
    document.getElementById('info-question').textContent = datos.pregunta.replace(`[${letra}]`, '').trim();
    document.getElementById('info-answer').textContent = datos.respuesta;
    document.getElementById('info-explanation').textContent = datos.explicacion;

    const modal = document.getElementById('info-modal');
    modal.classList.add('active');
  }

  function cerrarModalInfo() {
    const modal = document.getElementById('info-modal');
    modal.classList.remove('active');
  }

  function actualizarScore() {
    document.getElementById('score').textContent = `${aciertos}/${letras.length}`;
  }

  // ============ EVENT LISTENERS ============
  document.getElementById('btn-verify').addEventListener('click', comprobarRespuesta);
  document.getElementById('btn-skip').addEventListener('click', saltarPregunta);
  document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !document.getElementById('btn-verify').disabled) {
      comprobarRespuesta();
    }
  });

  document.getElementById('btn-continue').addEventListener('click', cerrarModalInfo);
  document.getElementById('info-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('info-modal')) {
      cerrarModalInfo();
    }
  });

  // ============ INICIALIZAR ============
  dibujarRosco();
</script>

</body>
</html>
