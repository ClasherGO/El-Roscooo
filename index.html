<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Rosco Épico - Grandes Pensadores (A-Z)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }
    
    body { 
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 1100px;
      width: 100%;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(83, 52, 131, 0.6);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: #00d4ff;
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .header p {
      color: #a0a0a0;
      font-size: 1.1em;
    }

    .rosco-container {
      position: relative;
      width: 600px;
      height: 600px;
      margin: 0 auto 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rosco-circle {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .rosco-letter {
      position: absolute;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #533483, #0f3460);
      border: 2px solid #00d4ff;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.8em;
      font-weight: 900;
      color: #00d4ff;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .rosco-letter:hover:not(.used):not(.incorrect) {
      background: linear-gradient(135deg, #00d4ff, #533483);
      color: #1a1a2e;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
    }

    .rosco-letter.used {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-color: #4ade80;
      color: white;
      cursor: not-allowed;
    }

    .rosco-letter.incorrect {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #ef4444;
      color: white;
      cursor: not-allowed;
    }

    .rosco-letter.skip {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #f59e0b;
      color: white;
      cursor: not-allowed;
    }

    .game-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      flex-wrap: wrap;
      gap: 15px;
    }

    .info-item {
      text-align: center;
      color: #00d4ff;
      flex: 1;
      min-width: 120px;
    }

    .info-label {
      font-size: 0.9em;
      color: #a0a0a0;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 1.8em;
      font-weight: 700;
      color: #00d4ff;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 2px solid #00d4ff;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .modal-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00d4ff, #533483);
      border-radius: 50%;
      font-size: 3em;
      font-weight: 900;
      color: white;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .modal-title {
      color: #00d4ff;
      font-size: 1.3em;
      font-weight: 700;
    }

    .question-text {
      color: #e0e0e0;
      font-size: 1.2em;
      margin: 25px 0;
      line-height: 1.6;
      padding: 20px;
      background: rgba(0, 212, 255, 0.05);
      border-left: 4px solid #00d4ff;
      border-radius: 8px;
    }

    .answer-hint {
      color: #a0a0a0;
      font-size: 0.95em;
      margin: 15px 0;
      padding: 12px 15px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 8px;
      border-left: 3px solid #f59e0b;
    }

    .answer-hint strong {
      color: #f59e0b;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin: 25px 0;
    }

    .answer-input {
      flex: 1;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid #00d4ff;
      border-radius: 8px;
      color: #00d4ff;
      font-size: 1em;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    .answer-input:focus {
      outline: none;
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
    }

    .answer-input::placeholder {
      color: #666;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    .btn {
      flex: 1;
      padding: 15px 25px;
      font-size: 1.1em;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-submit {
      background: linear-gradient(135deg, #00d4ff, #0fa0d9);
      color: #1a1a2e;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-skip {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }

    .btn-skip:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
    }

    .result-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 700;
      text-align: center;
      display: none;
    }

    .result-message.success {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border: 2px solid #4ade80;
      display: block;
    }

    .result-message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 2px solid #ef4444;
      display: block;
      max-height: 150px;
      overflow-y: auto;
    }

    .stats {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .stats h3 {
      color: #00d4ff;
      margin-bottom: 15px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #4ade80);
      transition: width 0.3s ease;
    }

    .completion-message {
      text-align: center;
      margin-top: 20px;
      padding: 20px;
      background: rgba(74, 222, 128, 0.2);
      border: 2px solid #4ade80;
      border-radius: 10px;
      color: #4ade80;
      font-size: 1.2em;
      font-weight: 700;
      display: none;
    }

    .completion-message.show {
      display: block;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @media (max-width: 1024px) {
      .rosco-container {
        width: 500px;
        height: 500px;
      }

      .rosco-letter {
        width: 50px;
        height: 50px;
        font-size: 1.5em;
      }

      .container {
        padding: 25px;
      }

      .header h1 {
        font-size: 2em;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .header h1 {
        font-size: 1.6em;
      }

      .rosco-container {
        width: 380px;
        height: 380px;
        margin: 0 auto 30px;
      }

      .rosco-letter {
        width: 42px;
        height: 42px;
        font-size: 1.2em;
      }

      .game-info {
        padding: 15px;
        gap: 10px;
      }

      .info-value {
        font-size: 1.4em;
      }

      .modal-content {
        padding: 25px;
        width: 95%;
      }

      .modal-letter {
        width: 60px;
        height: 60px;
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>

  <div class="container">
    <div class="header">
      <h1>🎯 Rosco Épico</h1>
      <p>Grandes Pensadores a través de la Historia (A-Z)</p>
    </div>

    <div class="game-info">
      <div class="info-item">
        <div class="info-label">Acertadas</div>
        <div class="info-value" id="correctCount">0/26</div>
      </div>
      <div class="info-item">
        <div class="info-label">Saltadas</div>
        <div class="info-value" id="skippedCount">0</div>
      </div>
      <div class="info-item">
        <div class="info-label">Errores</div>
        <div class="info-value" id="errorCount">0</div>
      </div>
    </div>

    <div class="rosco-container">
      <div class="rosco-circle" id="roscoCircle"></div>
    </div>

    <div class="stats">
      <h3>Progreso General</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="completion-message" id="completionMessage">
        🎉 ¡Felicitaciones! ¡Completaste el Rosco!
      </div>
    </div>
  </div>

  <div id="questionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-letter" id="modalLetter">A</div>
        <div>
          <div class="modal-title" id="modalTitle">Pregunta</div>
        </div>
      </div>
      
      <div class="question-text" id="questionText">
        Pregunta de ejemplo
      </div>

      <div class="answer-hint" id="answerHint">
        <strong>Tipo:</strong> La respuesta comienza con la letra indicada
      </div>

      <div class="input-group">
        <input 
          type="text" 
          class="answer-input" 
          id="answerInput" 
          placeholder="Escribe tu respuesta..."
          autocomplete="off"
        >
      </div>

      <div class="result-message" id="resultMessage"></div>

      <div class="button-group">
        <button class="btn btn-submit" id="submitBtn">Responder</button>
        <button class="btn btn-skip" id="skipBtn">Saltar</button>
      </div>
    </div>
  </div>

  <script>

      {

      },
      {

      },
      {

        answer: 'Ludwig Wittgenstein',

      {

        answer: 'Heráclito',

      },
      {
        letter: 'Y',
        question: '¿Filósofo griego que cuestionaba el conocimiento humano? (Contiene Y)',
        answer: 'Pirrón',
        type: 'contains',
        difficulty: 'difícil'
      },
      {
        letter: 'Z',
        question: '¿Filósofo griego eleático, famoso por sus paradojas sobre el movimiento? (Inicia con Z)',
        answer: 'Zenón de Elea',
        type: 'starts',
        difficulty: 'difícil'
      }
    ];

    class RoscoGame {
      constructor(data) {
        this.gameData = data;
        this.gameState = {
          correct: 0,
          skipped: 0,
          errors: 0,
          usedLetters: new Set(),
          correctLetters: new Set(),
          skippedLetters: new Set(),
          incorrectLetters: new Set()
        };
        this.currentLetter = null;
        this.modal = document.getElementById('questionModal');
        this.init();
      }

      init() {
        this.createStars();
        this.renderRosco();
        this.attachEventListeners();
      }

      createStars() {
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 80; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          starsContainer.appendChild(star);
        }
      }

      renderRosco() {
        const circle = document.getElementById('roscoCircle');
        circle.innerHTML = '';
        
        const totalLetters = this.gameData.length;
        const radius = 280;
        const center = { x: 300, y: 300 };

        this.gameData.forEach((item, index) => {
          const angle = (index / totalLetters) * Math.PI * 2 - Math.PI / 2;
          const x = center.x + radius * Math.cos(angle);
          const y = center.y + radius * Math.sin(angle);

          const button = document.createElement('button');
          button.className = 'rosco-letter';
          button.textContent = item.letter;
          button.dataset.letter = item.letter;
          
          button.style.left = x + 'px';
          button.style.top = y + 'px';

          if (this.gameState.correctLetters.has(item.letter)) {
            button.classList.add('used');
            button.disabled = true;
          } else if (this.gameState.skippedLetters.has(item.letter)) {
            button.classList.add('skip');
            button.disabled = true;
          } else if (this.gameState.incorrectLetters.has(item.letter)) {
            button.classList.add('incorrect');
            button.disabled = true;
          }
          
          button.addEventListener('click', () => this.openQuestion(item.letter));
          circle.appendChild(button);
        });
      }

      openQuestion(letter) {
        if (this.gameState.usedLetters.has(letter)) return;

        const question = this.gameData.find(q => q.letter === letter);
        this.currentLetter = question;

        document.getElementById('modalLetter').textContent = letter;
        document.getElementById('modalTitle').textContent = `Pregunta ${letter}`;
        document.getElementById('questionText').textContent = question.question;
        
        const hintText = question.type === 'starts' 
          ? `La respuesta comienza con la letra ${letter}`
          : `La respuesta contiene la letra ${letter}`;
        
        document.getElementById('answerHint').innerHTML = `<strong>Tipo:</strong> ${hintText}`;
        
        document.getElementById('answerInput').value = '';
        document.getElementById('resultMessage').textContent = '';
        document.getElementById('resultMessage').className = 'result-message';
        
        this.modal.classList.add('active');
        document.getElementById('answerInput').focus();
      }

      closeModal() {
        this.modal.classList.remove('active');
        this.currentLetter = null;
      }

      checkAnswer(userAnswer) {
        if (!userAnswer.trim()) {
          this.showMessage('Por favor, escribe una respuesta', 'error');
          return false;
        }

        const correct = userAnswer.toLowerCase().trim() === this.currentLetter.answer.toLowerCase();
        
        if (correct) {
          this.gameState.correctLetters.add(this.currentLetter.letter);
          this.gameState.usedLetters.add(this.currentLetter.letter);
          this.gameState.correct++;
          this.showMessage('✓ ¡Correcto!', 'success');
          
          setTimeout(() => {
            this.closeModal();
            this.updateUI();
            this.checkGameCompletion();
          }, 1000);
          return true;
        } else {
          this.gameState.errors++;
          this.showMessage(`✗ Incorrecto. La respuesta es: <strong>${this.currentLetter.answer}</strong>`, 'error');
          
          setTimeout(() => {
            this.gameState.incorrectLetters.add(this.currentLetter.letter);
            this.gameState.usedLetters.add(this.currentLetter.letter);
            this.closeModal();
            this.updateUI();
          }, 2500);
          return false;
        }
      }

      skipQuestion() {
        this.gameState.skipped++;
        this.gameState.skippedLetters.add(this.currentLetter.letter);
        this.gameState.usedLetters.add(this.currentLetter.letter);
        this.closeModal();
        this.updateUI();
      }

      showMessage(text, type) {
        const msgEl = document.getElementById('resultMessage');
        msgEl.innerHTML = text;
        msgEl.className = `result-message ${type}`;
      }

      checkGameCompletion() {
        if (this.gameState.correct === 26) {
          const completionMsg = document.getElementById('completionMessage');
          completionMsg.classList.add('show');
        }
      }

      updateUI() {
        document.getElementById('correctCount').textContent = `${this.gameState.correct}/26`;
        document.getElementById('skippedCount').textContent = this.gameState.skipped;
        document.getElementById('errorCount').textContent = this.gameState.errors;
        
        const progress = (this.gameState.correct / 26) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        
        this.renderRosco();
      }

      attachEventListeners() {
        document.getElementById('submitBtn').addEventListener('click', () => {
          const answer = document.getElementById('answerInput').value;
          this.checkAnswer(answer);
        });

        document.getElementById('answerInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const answer = document.getElementById('answerInput').value;
            this.checkAnswer(answer);
          }
        });

        document.getElementById('skipBtn').addEventListener('click', () => {
          this.skipQuestion();
        });

        this.modal.addEventListener('click', (e) => {
          if (e.target === this.modal) {
            this.closeModal();
          }
        });
      }
    }

    // Iniciar el juego
    const game = new RoscoGame(gameData);
  </script>
</body>
</html>
